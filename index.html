    <style>
        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        /* Judul Video */
        .video-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 20px 0;
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Container Utama */
        .video-container {
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Wrapper Video & Iklan */
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
        }

        video {
            width: 100%;
            display: block;
        }

        /* Area Iklan Atas (Pengganti Center) */
        .ad-slot-top {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
        }

        /* Tombol Call to Action */
        .cta-container {
            padding: 25px 15px;
        }

        .btn-full-hd {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #e60023; /* Warna lebih mencolok */
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 14px 30px;
            border-radius: 50px;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            animation: pulse 2s infinite;
        }

        .btn-full-hd:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(230, 0, 35, 0.4);
        }

        /* Animasi */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        @media (max-width: 480px) {
            .video-title { font-size: 1rem; }
            .btn-full-hd { font-size: 16px; width: 100%; justify-content: center; }
        }
    </style>
</head>
